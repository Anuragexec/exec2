<script>
const TODAY = new Date('2026-06-20');

function parseDate(s){
  if(!s||s==='')return null;
  if(typeof s==='number'){return new Date((s-25569)*86400000);}
  s=String(s).trim();
  if(s==='46361'){return new Date('2026-11-26');}
  let m;
  m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
  if(m){let y=m[3].length===2?'20'+m[3]:m[3];return new Date(y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0'));}
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){return new Date(m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0'));}
  try{let d=new Date(s);if(!isNaN(d))return d;}catch(e){}
  return null;
}

function daysSince(d){if(!d)return null;return Math.floor((TODAY-d)/86400000);}

function normalizeStage(s){
  if(!s||s.trim()==='')return'Unknown';
  s=s.trim().toUpperCase();
  if(s.includes('HO IPS')||s.includes('HOIPS'))return'HO IPS';
  if(s.includes('HO FS'))return'HO FS';
  if(s.includes('PUT UP TO HO SO'))return'Put up to HO SO FS';
  if(s==='SUD')return'SUD';
  if(s.includes('DISBURS'))return'Disbursed';
  if(s.includes('SANCTION'))return'Sanctioned';
  if(s.includes('BRANCH 3RD')||s.includes('B3P'))return'Branch 3rd Party';
  if(s.includes('LOST'))return'Lost Lead';
  if(s.includes('REJECT'))return'Rejected';
  return s.charAt(0)+s.slice(1).toLowerCase();
}

function normalizeQuery(s){
  if(!s||s.trim()==='')return'Not Set';
  s=s.trim().toUpperCase();
  if(s.includes('BRANCH'))return'Pending with Branch';
  if(s.includes('HO')||s.includes('PENDING WITH H'))return'Pending with HO';
  if(s.includes('SANCTION'))return'Sanctioned';
  if(s.includes('REJECT'))return'Rejected';
  if(s.includes('PUT UP FOR SANCTION'))return'PUT UP FOR SANCTION';
  if(s==='CLEAR')return'Clear';
  return s.charAt(0)+s.slice(1).toLowerCase();
}

function tatLabel(days){
  if(days===null)return'-';
  if(days<=7)return'On Track';
  if(days<=15)return'Watch';
  if(days<=30)return'Overdue';
  return'Critical';
}

let FILES = RAW.map(r=>({
  sno:r[0], dateStr:r[1], fileNo:r[2], name:r[3],
  amt:Number(r[4])||0, branch:r[5],
  stage:normalizeStage(r[6]), query:normalizeQuery(r[7]),
  po:r[8]||'', so:r[9]||'',
  date:parseDate(r[1]),
  days:null, tat:''
}));
FILES.forEach(f=>{f.days=daysSince(f.date);f.tat=tatLabel(f.days);});

const POS=[...new Set(FILES.map(f=>f.po).filter(x=>x))].sort();
const SOS=[...new Set(FILES.map(f=>f.so).filter(x=>x))].sort();
const BRANCHES=[...new Set(FILES.map(f=>f.branch).filter(x=>x))].sort();
const STAGES_LIST=['HO FS','HO IPS','SUD','Disbursed','Sanctioned','Branch 3rd Party','Lost Lead','Rejected','Unknown'];
const QS_LIST=['Pending with Branch','Pending with HO','Sanctioned','Rejected','Clear','Not Set','PUT UP FOR SANCTION'];

const STAGE_COL={'HO FS':'t-hofs','HO IPS':'t-hoips','SUD':'t-sud','Disbursed':'t-disb','Sanctioned':'t-sanc','Branch 3rd Party':'t-b3p','Lost Lead':'t-ll','Rejected':'t-rej'};
const QS_COL={'Pending with Branch':'t-pb','Pending with HO':'t-ph','Sanctioned':'t-cl','Clear':'t-cl','Rejected':'t-rej'};

let editIdx=null;

function sc(cls){return`<span class="tag ${cls||'t-unk'}">`}
function stageTag(s){return`${sc(STAGE_COL[s]||'t-unk')}${s||'—'}</span>`}
function qTag(q){return`${sc(QS_COL[q]||'')}${q||'—'}</span>`}
function fmtAmt(a){return a?'₹'+(a/100000).toFixed(1)+'L':'—'}
function tatSpan(t,d){
  const cls=t==='On Track'?'tat-on':t==='Watch'?'tat-watch':(t==='Overdue'||t==='Critical')?'tat-over':'tat-done';
  return`<span class="${cls}">${t} (${d??'—'}d)</span>`;
}

function bar(lbl,val,max,color,sfx=''){
  const pct=max?Math.round(val/max*100):0;
  return`<div class="bar-row"><div class="bar-lbl" title="${lbl}">${lbl}</div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-num">${val}${sfx}</div></div>`;
}

function sw(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['dash','pipeline','po','so','branch','files','add'][i]===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  const fn={dash:renderDash,pipeline:renderPipeline,po:renderPO,so:renderSO,branch:renderBranch,files:()=>{buildFileFilters();renderFiles();},add:renderAdd};
  if(fn[id])fn[id]();
}

function renderDash(){
  const total=FILES.length;
  const sanc=FILES.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned'||f.stage==='Disbursed').length;
  const pendB=FILES.filter(f=>f.query==='Pending with Branch').length;
  const pendH=FILES.filter(f=>f.query==='Pending with HO').length;
  const totalAmt=FILES.reduce((s,f)=>s+f.amt,0);
  const avgAmt=total?Math.round(totalAmt/total/100000):0;

  let html=`<div class="metrics">
    <div class="mc"><div class="lbl">Total logins</div><div class="val">${total}</div><div class="sub">June 2026</div></div>
    <div class="mc"><div class="lbl">Sanctioned</div><div class="val" style="color:#27500A">${sanc}</div><div class="sub">${Math.round(sanc/total*100)}% rate</div></div>
    <div class="mc"><div class="lbl">Pending — Branch</div><div class="val" style="color:#993C1D">${pendB}</div><div class="sub">needs branch reply</div></div>
    <div class="mc"><div class="lbl">Pending — HO</div><div class="val" style="color:#3C3489">${pendH}</div><div class="sub">needs HO action</div></div>
    <div class="mc"><div class="lbl">Avg loan size</div><div class="val">₹${avgAmt}L</div><div class="sub">₹${Math.round(totalAmt/10000000)}Cr total book</div></div>
  </div>`;

  // Stage distribution
  const stageCounts={};STAGES_LIST.forEach(s=>stageCounts[s]=FILES.filter(f=>f.stage===s).length);
  const maxS=Math.max(...Object.values(stageCounts),1);
  const sCols={'HO FS':'#378ADD','HO IPS':'#534AB7','SUD':'#EF9F27','Disbursed':'#1D9E75','Sanctioned':'#639922','Branch 3rd Party':'#888780','Lost Lead':'#D85A30','Rejected':'#E24B4A','Unknown':'#B4B2A9'};
  let stageBars=STAGES_LIST.filter(s=>stageCounts[s]>0).map(s=>bar(s,stageCounts[s],maxS,sCols[s])).join('');

  // Query distribution
  const qCounts={};QS_LIST.forEach(q=>qCounts[q]=FILES.filter(f=>f.query===q).length);
  const maxQ=Math.max(...Object.values(qCounts),1);
  const qCols={'Pending with Branch':'#D85A30','Pending with HO':'#534AB7','Sanctioned':'#639922','Clear':'#1D9E75','Rejected':'#E24B4A','Not Set':'#B4B2A9','PUT UP FOR SANCTION':'#EF9F27'};
  let qBars=QS_LIST.filter(q=>qCounts[q]>0).map(q=>bar(q,qCounts[q],maxQ,qCols[q])).join('');

  // TAT distribution
  const tatC={Critical:0,Overdue:0,Watch:0,'On Track':0};
  FILES.forEach(f=>{if(f.tat&&tatC[f.tat]!==undefined)tatC[f.tat]++;});
  const maxT=Math.max(...Object.values(tatC),1);
  const tCols={Critical:'#A32D2D',Overdue:'#D85A30',Watch:'#EF9F27','On Track':'#639922'};
  let tatBars=Object.entries(tatC).filter(([,v])=>v>0).map(([k,v])=>bar(k,v,maxT,tCols[k])).join('');

  html+=`<div class="three">
    <div class="card"><h3>Stage distribution</h3>${stageBars}</div>
    <div class="card"><h3>Query status</h3>${qBars}</div>
    <div class="card"><h3>TAT status</h3>${tatBars}<div style="font-size:10px;color:var(--color-text-secondary);margin-top:6px">Watch=8-15d · Overdue=16-30d · Critical>30d</div></div>
  </div>`;

  // Pending action table
  const pend=FILES.filter(f=>f.query==='Pending with Branch'||f.query==='Pending with HO').sort((a,b)=>(b.days||0)-(a.days||0));
  html+=`<div class="card" style="margin-top:0"><h3>🔴 Action required (${pend.length} files) — sorted by days pending</h3>
  <table><thead><tr><th>File No</th><th>Customer</th><th>Branch</th><th>Loan</th><th>PO</th><th>Stage</th><th>Query pending with</th><th>Days at hub</th></tr></thead><tbody>
  ${pend.map(f=>`<tr><td style="font-weight:500;font-size:10px">${f.fileNo}</td><td>${f.name}</td><td>${f.branch}</td><td>${fmtAmt(f.amt)}</td><td>${f.po||'—'}</td><td>${stageTag(f.stage)}</td><td>${qTag(f.query)}</td><td>${tatSpan(f.tat,f.days)}</td></tr>`).join('')}
  </tbody></table></div>`;

  document.getElementById('s-dash').innerHTML=html;
  document.getElementById('hdr-sub').textContent=`${total} files · ₹${Math.round(totalAmt/10000000)}Cr pipeline · As of 20-Jun-2026`;
  document.getElementById('last-upd').textContent='Ref: June-26 Tracker';
}

function renderPipeline(){
  const stages=['HO FS','HO IPS','SUD','Disbursed','Sanctioned','Branch 3rd Party','Lost Lead','Rejected'];
  const sCols={'HO FS':['#E6F1FB','#0C447C'],'HO IPS':['#EEEDFE','#26215C'],'SUD':['#FAEEDA','#412402'],'Disbursed':['#E1F5EE','#04342C'],'Sanctioned':['#EAF3DE','#173404'],'Branch 3rd Party':['#F1EFE8','#2C2C2A'],'Lost Lead':['#FCEBEB','#501313'],'Rejected':['#FCEBEB','#501313']};
  const qBg={'Pending with Branch':'#FAECE7','Pending with HO':'#EEEDFE','Sanctioned':'#EAF3DE','Clear':'#EAF3DE','Not Set':'#F1EFE8'};
  const qTx={'Pending with Branch':'#993C1D','Pending with HO':'#3C3489','Sanctioned':'#27500A','Clear':'#27500A','Not Set':'#5F5E5A'};
  let html=`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px">`;
  stages.forEach(s=>{
    const sf=FILES.filter(f=>f.stage===s);
    const [bg,fg]=sCols[s]||['#F1EFE8','#2C2C2A'];
    html+=`<div style="min-width:160px;flex-shrink:0">
      <div style="background:${bg};color:${fg};font-size:10px;font-weight:500;padding:5px 8px;border-radius:5px 5px 0 0;text-align:center">${s} <span style="background:${fg};color:${bg};border-radius:8px;padding:1px 5px;font-size:9px">${sf.length}</span></div>
      <div style="border:0.5px solid var(--color-border-tertiary,#e0e0e0);border-top:none;border-radius:0 0 5px 5px;min-height:50px;padding:4px;max-height:480px;overflow-y:auto">
      ${sf.map(f=>{const qb=qBg[f.query]||'#F1EFE8';const qt=qTx[f.query]||'#5F5E5A';return`<div onclick="openModal(${FILES.indexOf(f)})" style="background:${qb};color:${qt};padding:4px 6px;border-radius:4px;margin-bottom:3px;cursor:pointer;font-size:10px"><div style="font-weight:500">${f.fileNo.slice(-8)}</div><div style="opacity:.85">${f.name.split(' ').slice(0,2).join(' ')}</div><div style="opacity:.7">${f.po||'—'} · ${fmtAmt(f.amt)}</div><div style="font-size:9px;margin-top:1px">${f.query}</div></div>`}).join('')||'<div style="font-size:10px;color:var(--color-text-secondary);padding:6px">Empty</div>'}
      </div></div>`;
  });
  html+=`</div><div style="font-size:10px;color:var(--color-text-secondary);margin-top:6px">Click any file card to update stage / query status</div>`;
  document.getElementById('s-pipeline').innerHTML=html;
}

function renderPO(){
  const poData=POS.map(po=>{
    const pf=FILES.filter(f=>f.po===po);
    const sanc=pf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned'||f.stage==='Disbursed').length;
    const pendB=pf.filter(f=>f.query==='Pending with Branch').length;
    const pendH=pf.filter(f=>f.query==='Pending with HO').length;
    const avgDays=pf.length?Math.round(pf.reduce((s,f)=>s+(f.days||0),0)/pf.length):0;
    const critOver=pf.filter(f=>f.tat==='Critical'||f.tat==='Overdue').length;
    const sanctAmt=pf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned').reduce((s,f)=>s+f.amt,0);
    return{po,total:pf.length,sanc,pendB,pendH,avgDays,critOver,sanctAmt};
  }).sort((a,b)=>b.total-a.total);

  const maxTotal=Math.max(...poData.map(p=>p.total),1);
  const maxSanc=Math.max(...poData.map(p=>p.sanc),1);
  const maxAmt=Math.max(...poData.map(p=>p.sanctAmt),1);

  let html=`<div class="two">
    <div class="card"><h3>PO — files allocated</h3>${poData.map(p=>bar(p.po,p.total,maxTotal,'#378ADD')).join('')}</div>
    <div class="card"><h3>PO — sanctioned count</h3>${poData.map(p=>bar(p.po,p.sanc,maxSanc,'#639922')).join('')}</div>
  </div>
  <div class="two">
    <div class="card"><h3>PO — sanctioned amount (₹Cr)</h3>${poData.map(p=>bar(p.po,+(p.sanctAmt/10000000).toFixed(1),maxAmt/10000000,'#1D9E75','Cr')).join('')}</div>
    <div class="card"><h3>PO — overdue + critical files</h3>${poData.map(p=>bar(p.po,p.critOver,Math.max(...poData.map(x=>x.critOver),1),'#D85A30')).join('')}</div>
  </div>
  <div class="card"><h3>PO performance table</h3>
  <table><thead><tr><th>PO Name</th><th>Total files</th><th>Sanctioned</th><th>% conversion</th><th>Pending Branch</th><th>Pending HO</th><th>Avg TAT (days)</th><th>Overdue/Critical</th><th>Sanctioned amt</th></tr></thead><tbody>
  ${poData.map(p=>`<tr><td style="font-weight:500">${p.po}</td><td>${p.total}</td><td style="color:#27500A;font-weight:500">${p.sanc}</td><td>${p.total?Math.round(p.sanc/p.total*100):0}%</td><td style="color:#993C1D">${p.pendB}</td><td style="color:#3C3489">${p.pendH}</td><td class="${p.avgDays>20?'tat-over':p.avgDays>10?'tat-watch':'tat-on'}">${p.avgDays}d</td><td style="color:#A32D2D">${p.critOver}</td><td>${(p.sanctAmt/10000000).toFixed(1)}Cr</td></tr>`).join('')}
  </tbody></table></div>`;
  document.getElementById('s-po').innerHTML=html;
}

function renderSO(){
  const soData=SOS.map(so=>{
    const sf=FILES.filter(f=>f.so===so);
    const sanc=sf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned'||f.stage==='Disbursed').length;
    const avgDays=sf.length?Math.round(sf.reduce((s,f)=>s+(f.days||0),0)/sf.length):0;
    const critOver=sf.filter(f=>f.tat==='Critical'||f.tat==='Overdue').length;
    const sanctAmt=sf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned').reduce((s,f)=>s+f.amt,0);
    return{so,total:sf.length,sanc,avgDays,critOver,sanctAmt};
  }).sort((a,b)=>b.sanc-a.sanc);

  const maxSanc=Math.max(...soData.map(p=>p.sanc),1);
  const maxTotal=Math.max(...soData.map(p=>p.total),1);
  const maxAmt=Math.max(...soData.map(p=>p.sanctAmt),1);

  let html=`<div class="two">
    <div class="card"><h3>SO — sanctioned count</h3>${soData.map(p=>bar(p.so,p.sanc,maxSanc,'#639922')).join('')}</div>
    <div class="card"><h3>SO — files under review</h3>${soData.map(p=>bar(p.so,p.total,maxTotal,'#378ADD')).join('')}</div>
  </div>
  <div class="card"><h3>SO — sanctioned amount (₹Cr)</h3>${soData.map(p=>bar(p.so,+(p.sanctAmt/10000000).toFixed(1),maxAmt/10000000,'#1D9E75','Cr')).join('')}</div>
  <div class="card" style="margin-top:10px"><h3>SO performance table</h3>
  <table><thead><tr><th>SO Name</th><th>Files assigned</th><th>Sanctioned</th><th>% conversion</th><th>Avg TAT (days)</th><th>Overdue/Critical</th><th>Sanctioned amt</th></tr></thead><tbody>
  ${soData.map(p=>`<tr><td style="font-weight:500">${p.so}</td><td>${p.total}</td><td style="color:#27500A;font-weight:500">${p.sanc}</td><td>${p.total?Math.round(p.sanc/p.total*100):0}%</td><td class="${p.avgDays>20?'tat-over':p.avgDays>10?'tat-watch':'tat-on'}">${p.avgDays}d</td><td style="color:#A32D2D">${p.critOver}</td><td>${(p.sanctAmt/10000000).toFixed(1)}Cr</td></tr>`).join('')}
  </tbody></table></div>`;
  document.getElementById('s-so').innerHTML=html;
}

    const bf=FILES.filter(f=>f.branch===br);
    const sanc=bf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned'||f.stage==='Disbursed').length;
    const pendB=bf.filter(f=>f.query==='Pending with Branch').length;
    const pendH=bf.filter(f=>f.query==='Pending with HO').length;
    const avgDays=bf.length?Math.round(bf.reduce((s,f)=>s+(f.days||0),0)/bf.length):0;
    const totalAmt=bf.reduce((s,f)=>s+f.amt,0);
    const sanctAmt=bf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned').reduce((s,f)=>s+f.amt,0);
    return{br,total:bf.length,sanc,pendB,pendH,avgDays,totalAmt,sanctAmt};
  }).sort((a,b)=>b.total-a.total);

  const maxTotal=Math.max(...brData.map(p=>p.total),1);
  const maxSanc=Math.max(...brData.map(p=>p.sanc),1);
  const maxAmt=Math.max(...brData.map(p=>p.totalAmt),1);

  let html=`<div class="two">
    <div class="card"><h3>Branch — logins (file count)</h3>${brData.map(p=>bar(p.br,p.total,maxTotal,'#378ADD')).join('')}</div>
    <div class="card"><h3>Branch — sanctions</h3>${brData.map(p=>bar(p.br,p.sanc,maxSanc,'#639922')).join('')}</div>
  </div>
  <div class="card" style="margin-bottom:10px"><h3>Branch — total loan book (₹Cr)</h3>${brData.map(p=>bar(p.br,+(p.totalAmt/10000000).toFixed(1),maxAmt/10000000,'#534AB7','Cr')).join('')}</div>
  <div class="card"><h3>Branch performance table</h3>
  <table><thead><tr><th>Branch</th><th>Total logins</th><th>Sanctioned</th><th>Conversion %</th><th>Pending Branch</th><th>Pending HO</th><th>Avg TAT</th><th>Total book</th><th>Sanctioned amt</th></tr></thead><tbody>
  ${brData.map(p=>`<tr><td style="font-weight:500">${p.br}</td><td>${p.total}</td><td style="color:#27500A;font-weight:500">${p.sanc}</td><td>${p.total?Math.round(p.sanc/p.total*100):0}%</td><td style="color:#993C1D">${p.pendB}</td><td style="color:#3C3489">${p.pendH}</td><td class="${p.avgDays>20?'tat-over':p.avgDays>10?'tat-watch':'tat-on'}">${p.avgDays}d</td><td>${(p.totalAmt/10000000).toFixed(1)}Cr</td><td>${(p.sanctAmt/10000000).toFixed(1)}Cr</td></tr>`).join('')}
  </tbody></table></div>`;
  document.getElementById('s-branch').innerHTML=html;

let fileFiltersBuilt=false;
function buildFileFilters(){
  if(fileFiltersBuilt)return;fileFiltersBuilt=true;
  ['ff-branch','ff-po','ff-so','ff-stage','ff-query'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    const opts={
      'ff-branch':BRANCHES,'ff-po':POS,'ff-so':SOS,
      'ff-stage':STAGES_LIST,'ff-query':QS_LIST
    };
    (opts[id]||[]).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});
  });
}

function renderFiles(){
  const br=document.getElementById('ff-branch')?.value||'';
  const po=document.getElementById('ff-po')?.value||'';
  const so=document.getElementById('ff-so')?.value||'';
  const st=document.getElementById('ff-stage')?.value||'';
  const qu=document.getElementById('ff-query')?.value||'';
  const srch=(document.getElementById('ff-search')?.value||'').toLowerCase();
  const filt=FILES.filter(f=>
    (!br||f.branch===br)&&(!po||f.po===po)&&(!so||f.so===so)&&
    (!st||f.stage===st)&&(!qu||f.query===qu)&&
    (!srch||(f.name.toLowerCase().includes(srch)||f.fileNo.toLowerCase().includes(srch)))
  );
  const tbody=document.getElementById('files-tbody');
  if(tbody)tbody.innerHTML=filt.map((f,i)=>`<tr>
    <td style="font-size:10px;font-weight:500">${f.fileNo}</td>
    <td>${f.name}</td><td>${f.branch}</td>
    <td>${fmtAmt(f.amt)}</td>
    <td>${f.po||'—'}</td><td>${f.so||'—'}</td>
    <td>${stageTag(f.stage)}</td>
    <td>${qTag(f.query)}</td>
    <td>${tatSpan(f.tat,f.days)}</td>
    <td><button class="btn" style="font-size:10px;padding:3px 8px" onclick="openModal(${FILES.indexOf(f)})">Edit</button></td>
  </tr>`).join('')||'<tr><td colspan="10" style="text-align:center;color:var(--color-text-secondary);padding:16px">No files match</td></tr>';
  const cnt=document.getElementById('files-count');
  if(cnt)cnt.textContent=`${filt.length} of ${FILES.length} files`;
}

function renderAdd(){
  const poOpts=POS.map(p=>`<option>${p}</option>`).join('');
  const soOpts=SOS.map(s=>`<option>${s}</option>`).join('');
  const brOpts=BRANCHES.map(b=>`<option>${b}</option>`).join('');
  document.getElementById('s-add').innerHTML=`
  <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">Add new file login from branch</p>
  <div class="add-grid">
    <div class="fg"><label>File No *</label><input id="a-fileno" placeholder="e.g. DL0110020000099"></div>
    <div class="fg"><label>Customer Name *</label><input id="a-name" placeholder="Full name"></div>
    <div class="fg"><label>Loan Amount (₹)</label><input id="a-amt" type="number" placeholder="e.g. 3500000"></div>
    <div class="fg"><label>Branch *</label><select id="a-branch"><option value="">Select branch</option>${brOpts}<option value="__new__">+ Other</option></select></div>
    <div class="fg"><label>Date Received</label><input id="a-date" type="date" value="2026-06-20"></div>
    <div class="fg"><label>PO Name *</label><select id="a-po"><option value="">Select PO</option>${poOpts}</select></div>
    <div class="fg"><label>SO Name</label><select id="a-so"><option value="">Select SO</option>${soOpts}</select></div>
    <div class="fg"><label>Current Stage</label><select id="a-stage"><option>HO FS</option><option>HO IPS</option><option>SUD</option><option>Branch 3rd Party</option></select></div>
    <div class="fg"><label>Query Status</label><select id="a-query"><option>Not Set</option><option>Pending with Branch</option><option>Pending with HO</option><option>Clear</option></select></div>
  </div>
  <div style="display:flex;gap:8px"><button class="btn pri" onclick="addFile()">Add file</button><button class="btn" onclick="document.getElementById('s-add').querySelector('p').nextElementSibling.querySelectorAll('input,select').forEach(e=>e.value='')">Clear</button></div>
  <p id="add-msg" style="font-size:11px;margin-top:8px"></p>`;
}

function addFile(){
  const fn=document.getElementById('a-fileno').value.trim();
  const nm=document.getElementById('a-name').value.trim();
  const br=document.getElementById('a-branch').value;
  const po=document.getElementById('a-po').value;
  if(!fn||!nm||!br||!po){document.getElementById('add-msg').textContent='Fill required fields (*).';document.getElementById('add-msg').style.color='#A32D2D';return;}
  const dt=document.getElementById('a-date').value||'2026-06-20';
  const d=new Date(dt);
  const f={sno:String(FILES.length+1),dateStr:dt,fileNo:fn,name:nm,
    amt:Number(document.getElementById('a-amt').value)||0,
    branch:br,stage:document.getElementById('a-stage').value,
    query:document.getElementById('a-query').value,
    po:po,so:document.getElementById('a-so').value,date:d,
    days:daysSince(d),tat:''};
  f.tat=tatLabel(f.days);
  FILES.push(f);
  document.getElementById('add-msg').textContent=`✓ File ${fn} added.`;document.getElementById('add-msg').style.color='#27500A';
  fileFiltersBuilt=false;
}

function openModal(idx){
  editIdx=idx;const f=FILES[idx];
  document.getElementById('modal-title').textContent=`Update: ${f.name}`;
  document.getElementById('m-stage').value=f.stage;
  document.getElementById('m-query').value=f.query;
  const mpo=document.getElementById('m-po');mpo.innerHTML=POS.map(p=>`<option${p===f.po?' selected':''}>${p}</option>`).join('');
  const mso=document.getElementById('m-so');mso.innerHTML=['—',...SOS].map(s=>`<option${s===f.so?' selected':''}>${s}</option>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editIdx=null;}
function saveModal(){
  if(editIdx===null)return;
  FILES[editIdx].stage=normalizeStage(document.getElementById('m-stage').value);
  FILES[editIdx].query=normalizeQuery(document.getElementById('m-query').value);
  FILES[editIdx].po=document.getElementById('m-po').value;
  const sv=document.getElementById('m-so').value;
  FILES[editIdx].so=sv==='—'?'':sv;
  closeModal();fileFiltersBuilt=false;
  const activeTab=document.querySelector('.tab.active');
  if(activeTab)activeTab.click();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// Build files tab HTML
document.getElementById('s-files').innerHTML=`

</div>
<table><thead><tr><th>File No</th><th>Customer</th><th>Branch</th><th>Loan</th><th>PO</th><th>SO</th><th>Stage</th><th>Query Status</th><th>TAT</th><th></th></tr></thead><tbody id="files-tbody"></tbody></table>`;
